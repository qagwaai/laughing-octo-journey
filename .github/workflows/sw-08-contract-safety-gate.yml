name: SW-08 Contract Safety Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  report-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SW-08 report-only gate
        run: npm run contract:check

      - name: Upload SW-08 report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sw-08-contract-safety-gate-report
          path: reports/sw-08-contract-safety-gate/
          if-no-files-found: error
