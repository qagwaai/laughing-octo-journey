name: SW-08 Contract Safety Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      exception-file:
        description: Optional approved exception manifest path
        required: false
        type: string

permissions:
  contents: read

jobs:
  hard-fail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate SW-08 assumption change note
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if echo "$changed_files" | grep -q "^docs/planning/sw-08/frontend-consumer-contract-inventory.json$"; then
            if ! echo "$PR_BODY" | grep -qi "SW-08 Assumption Change Note:"; then
              echo "Missing required PR note: SW-08 Assumption Change Note:"
              exit 1
            fi
          fi

      - name: Run SW-08 hard-fail gate
        id: sw08_gate
        env:
          SW08_CONTRACT_EXCEPTION_FILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['exception-file'] || '' }}
        run: npm run contract:check:stage3

      - name: Summarize SW-08 gate result
        if: always()
        run: |
          if [ "${{ steps.sw08_gate.outcome }}" = "failure" ]; then
            echo "SW-08 stage 3 hard fail detected breaking drift or invalid exception metadata. Review reports/sw-08-contract-safety-gate/report.md for owner mapping and remediation hints." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SW-08 stage 3 gate passed or an approved exception was applied within policy bounds." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summarize SW-08 weekly metrics
        if: always()
        run: |
          node -e "const fs=require('node:fs'); const weekly='reports/sw-08-contract-safety-gate/weekly-metrics.json'; const rolling='reports/sw-08-contract-safety-gate/rolling-30d-trends.json'; if(fs.existsSync(weekly)){ const m=JSON.parse(fs.readFileSync(weekly,'utf8')); console.log('SW-08 weekly metrics'); console.log('- Drift count: ' + m.driftCount); console.log('- MTTR (hours): ' + (m.mttrHours ?? 'n/a')); console.log('- Bypass count: ' + m.bypassCount); console.log('- Expired bypasses: ' + m.expiredBypasses); console.log('- Near-expiry bypasses: ' + (m.nearExpiryBypasses ?? 0)); } if(fs.existsSync(rolling)){ const r=JSON.parse(fs.readFileSync(rolling,'utf8')); console.log('SW-08 rolling 30-day trends'); console.log('- Drift by class: ' + JSON.stringify(r.driftCountByClass ?? {})); console.log('- Impacted surfaces: ' + JSON.stringify(r.impactedSurfaceCounts ?? {})); console.log('- Owner tags: ' + JSON.stringify(r.ownerTagCounts ?? {})); console.log('- Repeat offenders: ' + JSON.stringify(r.repeatOffenders ?? [])); }" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SW-08 report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sw-08-contract-safety-gate-report
          path: reports/sw-08-contract-safety-gate/
          if-no-files-found: error
