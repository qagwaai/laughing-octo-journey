<div class="ops-page-container">
	<app-guarded-left-menu [playerName]="playerName()" [joinCharacter]="joinCharacter()"></app-guarded-left-menu>
	<div class="page-main">
		<div class="page-header">
			<div>
				<h1>{{ t.game.fabricationLab.title }}</h1>
				<p class="subtitle">{{ t.game.fabricationLab.subtitle }}</p>
			</div>
			<app-character-ship-badge [playerName]="playerName()" [joinCharacter]="joinCharacter()"></app-character-ship-badge>
		</div>

		<section class="ops-card">
			<h2>{{ t.game.fabricationLab.sectionTitle }}</h2>
			<p>{{ t.game.fabricationLab.sectionDescription }}</p>
		</section>
	</div>
</div>
