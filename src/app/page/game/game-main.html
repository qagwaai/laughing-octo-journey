<div class="ops-page-container">
	<app-guarded-left-menu [playerName]="playerName()" [joinCharacter]="joinCharacter()"></app-guarded-left-menu>
	<div class="page-main">
		<div class="page-header">
			<div>
				<h1>{{ t.game.main.title }}</h1>
				<p class="subtitle">{{ t.game.main.subtitle }}</p>
			</div>
			@if (joinCharacter()) {
				<button class="character-avatar" type="button" (click)="navigateToCharacterProfile()" [title]="joinCharacter()!.characterName">
					{{ joinCharacter()!.characterName.charAt(0).toUpperCase() }}
				</button>
			}
		</div>

		@if (joinCharacter()) {
			<p class="context">{{ t.common.characterPrefix }} <strong>{{ joinCharacter()!.characterName }}</strong></p>
		}

		<section class="ops-card">
			<h2>{{ t.game.main.sectionTitle }}</h2>
			<p>{{ t.game.main.sectionDescription }}</p>
		</section>
	</div>
</div>
