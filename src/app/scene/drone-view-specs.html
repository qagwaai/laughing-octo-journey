<ngt-color *args="['#090625']" attach="background" />

<ngt-ambient-light #ambient name="ambient" [intensity]="0.5" />
<ngt-spot-light
    name="spot"
    [position]="[5, 10, -10]"
    [intensity]="0.5 * Math.PI"
    [angle]="0.5"
    [penumbra]="1"
    [decay]="0"
    castShadow
/>

<ngts-orbit-controls name="orbit" [options]="{ zoomSpeed: 0.2 }" />

<app-expendible-dart-drone [position]="[4, 1.5, 0]" />

@let _textures = textures.value();
<ngt-mesh [position]="[-3, 2, 0]">
    <ngt-plane-geometry *args="[10, 10]" />
    <ngt-mesh-standard-material [map]="_textures?.specsheet ?? null" [transparent]="true" />
</ngt-mesh>
