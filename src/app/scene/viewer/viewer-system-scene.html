<ngt-color *args="['#02060f']" attach="background" />
<ngt-ambient-light [intensity]="0.15" />
<ngt-point-light [position]="[0, 0, 0]" [intensity]="2.5" [distance]="120" [decay]="2" />
<ngts-orbit-controls #orbitControls [options]="{ enableDamping: true, dampingFactor: 0.08 }" />

<ngt-mesh [position]="[0, 0, 0]" (pointerdown)="onScenePointerDown($event)" input>
  <ngt-sphere-geometry *args="[280, 16, 16]" />
  <ngt-mesh-basic-material [transparent]="true" [opacity]="0" [side]="1" [depthWrite]="false" />
</ngt-mesh>

<ngt-mesh [rotation]="[1.5708, 0, 0]" [position]="[0, 0, 0]" [renderOrder]="-2">
  <ngt-circle-geometry *args="[28, 128]" />
  <ngt-mesh-basic-material
    [color]="'#7ea2c9'"
    [transparent]="true"
    [opacity]="0.05"
    [side]="2"
    [depthWrite]="false"
  />
</ngt-mesh>

<ngt-mesh [rotation]="[1.5708, 0, 0]" [position]="[0, 0, 0]" [renderOrder]="-1">
  <ngt-ring-geometry *args="[27.92, 28.08, 192]" />
  <ngt-mesh-basic-material
    [color]="'#ffffff'"
    [transparent]="true"
    [opacity]="0.3"
    [side]="2"
    [depthWrite]="false"
  />
</ngt-mesh>

@for (orbit of orbitEllipses(); track orbit.id) {
<ngt-mesh [position]="orbit.center" [rotation]="orbit.rotation" [scale]="[orbit.radiusX, orbit.radiusZ, 1]" [renderOrder]="orbit.isMarketStation ? 20 : 0">
  <ngt-ring-geometry *args="orbit.isMarketStation ? [0.96, 1.04, 256] : [0.9995, 1.0005, 256]" />
  <ngt-mesh-basic-material [color]="orbit.color" [transparent]="true" [opacity]="orbit.opacity" [side]="2" [depthWrite]="false" [depthTest]="orbit.isMarketStation ? false : true" />
</ngt-mesh>
}

@for (body of stars(); track body.id) {
<ngt-mesh [position]="body.position" [name]="body.displayName"
  (pointerover)="onBodyPointerOver(body.source)"
  (pointerout)="onBodyPointerOut(body.id)"
  input
>
  <ngt-sphere-geometry *args="[body.radius, 48, 48]" />
  <ngt-mesh-basic-material [color]="hoveredBodyId() === body.id ? '#ff3b30' : targetedBodyId() === body.id ? '#f59e0b' : body.color" />
</ngt-mesh>
}

@for (body of nonStars(); track body.id) {
<ngt-mesh [position]="body.position" [name]="body.displayName"
  (pointerover)="onBodyPointerOver(body.source)"
  (pointerout)="onBodyPointerOut(body.id)"
  (pointerdown)="onBodyPointerDown($event, body.source)"
  input
>
  <ngt-sphere-geometry *args="[body.radius, 32, 32]" />
  <ngt-mesh-standard-material
    [color]="
      hoveredBodyId() === body.id
        ? '#ff3b30'
        : targetedBodyId() === body.id
          ? '#f59e0b'
          : body.bodyType === 'planet'
            ? '#ffffff'
            : body.isMarketStation
              ? '#22c55e'
              : body.color
    "
    [roughness]="0.8"
    [metalness]="0.05"
    [emissive]="
      hoveredBodyId() === body.id
        ? '#8f0000'
        : targetedBodyId() === body.id
          ? '#92400e'
          : body.bodyType === 'planet'
            ? '#aab8d0'
            : body.isMarketStation
              ? '#14532d'
              : '#000000'
    "
    [emissiveIntensity]="
      hoveredBodyId() === body.id
        ? 0.4
        : body.bodyType === 'planet'
          ? 0.2
          : body.isMarketStation
            ? 0.2
            : 0
    "
  />
</ngt-mesh>
}
