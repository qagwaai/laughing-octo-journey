<ngt-color *args="['#01040a']" attach="background" />
<ngt-fog *args="['#01040a', 4, 16]" attach="fog" />

<ngt-ambient-light [intensity]="0.35" />
<ngt-directional-light [position]="[-6, 4, -8]" [intensity]="1.2" [color]="'#4ba5ff'" />
<ngt-point-light [position]="[4.2, -0.8, -2.8]" [intensity]="0.55" [distance]="6" [color]="'#6cd8ff'" />

<ngts-orbit-controls
	[options]="{ enablePan: false, enableZoom: false, minPolarAngle: 1.35, maxPolarAngle: 1.8, autoRotate: true, autoRotateSpeed: 0.12 }"
/>

<app-cracked-cockpit-window />

<app-hud-overlay [title]="hudTitle()" [aiLabel]="aiLabel()" [systemChecks]="visibleSystemChecks()" [aiMessage]="visibleAiMessage()" />

@for (debris of visibleDebris(); track $index) {
	<ngt-mesh [position]="debris.position" [rotation]="debris.rotation" [scale]="debris.scale">
		<ngt-box-geometry *args="[1, 1, 1]" />
		<ngt-mesh-standard-material [color]="'#161f2c'" [metalness]="0.58" [roughness]="0.76" />
	</ngt-mesh>
}
