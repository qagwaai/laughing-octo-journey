<nav
  class="ops-menu"
  [class.is-expanded]="isExpanded()"
  [class.is-pinned]="menuMode() === 'pinned'"
  [class.is-keep-mini]="menuMode() === 'keep-mini'"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <button
    type="button"
    class="pin-toggle"
    (click)="togglePinned()"
    [attr.aria-pressed]="menuToggleAriaPressed()"
    [attr.aria-label]="menuToggleAriaLabel()"
  >
    <span class="menu-icon" aria-hidden="true">{{ menuToggleIcon() }}</span>
    <span class="menu-label">{{ menuToggleLabel() }}</span>
  </button>

  @for (item of menuItems; track item.route) {
  <button
    type="button"
    (click)="navigateLeft(item.route)"
    [class.logout]="item.logout"
    [class.is-guided-target]="isGuidanceActiveForItem(item.route)"
    [class.is-disabled]="disableNonLogout && !item.logout"
    [disabled]="disableNonLogout && !item.logout"
    [attr.aria-label]="item.label"
    [attr.title]="isExpanded() ? null : item.label"
  >
    <span class="menu-icon" aria-hidden="true">{{ item.icon }}</span>
    <span class="menu-label">{{ item.label }}</span>
    @if (isGuidanceActiveForItem(item.route)) {
    <span class="menu-badge" aria-hidden="true">NEXT</span>
    }
  </button>
  }
</nav>
