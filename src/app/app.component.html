<div class="flex h-dvh w-full" [style.cursor]="isResizing() ? 'col-resize' : 'default'">
  <!-- Left Content Area with Router Outlet -->
  <div class="relative flex flex-col overflow-auto bg-gray-900 text-white" #leftPanel>
    <router-outlet name="left" />
    <app-left-pane-mission-guidance-overlay />
    <div class="p-4">
      <tweakpane-pane title="Options" [container]="host">
        <tweakpane-checkbox [(value)]="stats" label="Show Stats" (valueChange)="onStatsChange($event)" />
        <tweakpane-checkbox
          [(value)]="audioHooksEnabled"
          label="Audio Hooks"
          (valueChange)="onAudioHooksChange($event)"
        />
        <tweakpane-checkbox [(value)]="audioArmed" [label]="audioArmedLabel()" [disabled]="true" />
        <tweakpane-checkbox [(value)]="audioBedRunning" [label]="audioBedLabel()" [disabled]="true" />
        <tweakpane-checkbox [(value)]="speechAvailable" label="Speech Synth" [disabled]="true" />
        <tweakpane-checkbox [(value)]="follow" label="Follow" />
        <tweakpane-checkbox [(value)]="lockX" label="Lock X" />
        <tweakpane-checkbox [(value)]="lockY" label="Lock Y" />
        <tweakpane-checkbox [(value)]="lockZ" label="Lock Z" />
        <tweakpane-color [(value)]="color" label="Color" />
        <tweakpane-button title="Reset" (click)="reset()" />
      </tweakpane-pane>
    </div>
  </div>

  <!-- Divider -->
  <div class="relative" style="width: 20px; pointer-events: auto; user-select: none; z-index: 10; flex-shrink: 0">
    <button
      type="button"
      class="absolute top-2 left-1/2 z-20 flex h-6 w-6 -translate-x-1/2 items-center justify-center rounded border border-gray-500/70 bg-gray-900/90 text-gray-200 hover:border-blue-400 hover:text-blue-300 focus:ring-2 focus:ring-blue-400 focus:outline-none"
      (mousedown)="$event.stopPropagation()"
      (click)="resetSplit()"
      aria-label="Reset split to 50/50"
      title="Reset split to 50/50"
    >
      <svg viewBox="0 0 24 24" class="h-3.5 w-3.5" aria-hidden="true">
        <rect x="4" y="6" width="6" height="12" rx="1" fill="currentColor" opacity="0.85"></rect>
        <rect x="14" y="6" width="6" height="12" rx="1" fill="currentColor" opacity="0.85"></rect>
      </svg>
    </button>

    <div
      #divider
      class="absolute top-0 left-1/2 h-full -translate-x-1/2 cursor-col-resize bg-gray-700 transition-colors hover:bg-blue-500"
      style="width: 2px"
      (mousedown)="startResize($event)"
      (dblclick)="resetSplit()"
    ></div>
  </div>

  <!-- Right Canvas Area -->
  <div class="relative flex-1" #rightPanel>
    @if (rightOutletActive()) {
      <div class="h-full overflow-auto bg-gray-950 text-white">
        <router-outlet name="right" />
      </div>
    } @else {
      <ngt-canvas
        #canvas
        [stats]="{ parent: host, domClass: 'stats' }"
        shadows
        [camera]="{ position: [5, 5, 5] }"
        [lookAt]="[0, 0, 0]"
        (click)="onCanvasClick()"
      >
        <app-routed-scene *canvasContent />
      </ngt-canvas>

      @if (showColdBootLookHint()) {
        <div
          class="pointer-events-none absolute bottom-5 left-1/2 -translate-x-1/2 rounded border border-cyan-300/30 bg-slate-950/55 px-3 py-1 text-[0.66rem] tracking-[0.2em] text-cyan-100/80 transition-opacity duration-700"
          [style.opacity]="lookHintOpacity()"
        >
          HOLD DRAG TO LOOK
        </div>
      }
    }
  </div>
</div>
