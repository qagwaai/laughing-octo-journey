<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840" role="img" aria-label="Sensor Array blueprint overlay">
  <defs>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc9ff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#d6f2ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#7cc9ff" stop-opacity="0.45" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#lineGlow)" filter="url(#softGlow)">
    <!-- Main truss spine -->
    <rect x="220" y="370" width="960" height="100" rx="46" stroke-width="2.6" />
    <line x1="280" y1="390" x2="1120" y2="390" stroke-width="1.2" stroke-dasharray="8 6" />
    <line x1="280" y1="450" x2="1120" y2="450" stroke-width="1.2" stroke-dasharray="8 6" />

    <!-- Central telemetry core -->
    <ellipse cx="700" cy="420" rx="148" ry="112" stroke-width="2.4" />
    <ellipse cx="700" cy="420" rx="92" ry="68" stroke-width="1.6" />
    <line x1="700" y1="308" x2="700" y2="532" stroke-width="1.2" stroke-dasharray="7 6" />

    <!-- Left dish assembly -->
    <ellipse cx="300" cy="420" rx="110" ry="150" stroke-width="2.2" />
    <ellipse cx="300" cy="420" rx="72" ry="102" stroke-width="1.4" />
    <line x1="412" y1="420" x2="554" y2="420" stroke-width="2" />
    <circle cx="344" cy="420" r="8" stroke-width="1.6" />

    <!-- Right dish assembly -->
    <ellipse cx="1100" cy="420" rx="110" ry="150" stroke-width="2.2" />
    <ellipse cx="1100" cy="420" rx="72" ry="102" stroke-width="1.4" />
    <line x1="846" y1="420" x2="988" y2="420" stroke-width="2" />
    <circle cx="1056" cy="420" r="8" stroke-width="1.6" />

    <!-- Top sensor masts -->
    <line x1="560" y1="370" x2="560" y2="248" stroke-width="1.8" />
    <line x1="840" y1="370" x2="840" y2="248" stroke-width="1.8" />
    <rect x="530" y="224" width="60" height="30" rx="6" stroke-width="1.4" />
    <rect x="810" y="224" width="60" height="30" rx="6" stroke-width="1.4" />

    <!-- Bottom thermal sink pack -->
    <rect x="570" y="548" width="260" height="58" rx="24" stroke-width="1.8" />
    <line x1="596" y1="577" x2="804" y2="577" stroke-width="1.2" stroke-dasharray="6 6" />

    <!-- Dimension lines -->
    <line x1="220" y1="660" x2="1180" y2="660" stroke-width="1.6" />
    <line x1="220" y1="654" x2="220" y2="674" stroke-width="1.6" />
    <line x1="1180" y1="654" x2="1180" y2="674" stroke-width="1.6" />

    <line x1="120" y1="270" x2="120" y2="570" stroke-width="1.6" />
    <line x1="114" y1="270" x2="134" y2="270" stroke-width="1.6" />
    <line x1="114" y1="570" x2="134" y2="570" stroke-width="1.6" />

    <!-- Technical callouts -->
    <line x1="700" y1="308" x2="700" y2="168" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="700" cy="308" r="4" stroke-width="1.4" />

    <line x1="530" y1="240" x2="412" y2="156" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="530" cy="240" r="4" stroke-width="1.4" />

    <line x1="830" y1="577" x2="934" y2="708" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="830" cy="577" r="4" stroke-width="1.4" />
  </g>

  <g fill="#c8f0ff" font-size="24" font-family="monospace" letter-spacing="1.2">
    <text x="542" y="152">TELEMETRY FUSION CORE</text>
    <text x="256" y="144">WIDEBAND PHASED RECEIVER</text>
    <text x="946" y="724">THERMAL SINK PACK</text>
  </g>
</svg>
