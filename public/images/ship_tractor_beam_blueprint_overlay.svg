<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840" role="img" aria-label="Tractor Beam blueprint overlay">
  <defs>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc9ff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#d6f2ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#7cc9ff" stop-opacity="0.45" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#lineGlow)" filter="url(#softGlow)">
    <!-- Core barrel -->
    <rect x="240" y="354" width="920" height="132" rx="58" stroke-width="2.6" />
    <rect x="306" y="390" width="788" height="60" rx="28" stroke-width="1.4" />

    <!-- Field emitter ring assembly -->
    <ellipse cx="700" cy="420" rx="174" ry="132" stroke-width="2.4" />
    <ellipse cx="700" cy="420" rx="118" ry="88" stroke-width="1.6" />
    <ellipse cx="700" cy="420" rx="70" ry="52" stroke-width="1.2" />

    <!-- Forward focusing dish -->
    <ellipse cx="1144" cy="420" rx="72" ry="96" stroke-width="2.2" />
    <ellipse cx="1144" cy="420" rx="42" ry="58" stroke-width="1.4" />
    <line x1="1068" y1="420" x2="984" y2="420" stroke-width="2" />

    <!-- Rear power coupler -->
    <ellipse cx="256" cy="420" rx="58" ry="82" stroke-width="2.2" />
    <ellipse cx="256" cy="420" rx="34" ry="48" stroke-width="1.4" />
    <line x1="314" y1="420" x2="406" y2="420" stroke-width="2" />

    <!-- Upper stabilizer arches -->
    <path d="M 466 354 C 466 258, 552 212, 646 232" stroke-width="2" />
    <path d="M 754 232 C 848 212, 934 258, 934 354" stroke-width="2" />

    <!-- Lower calibration pod -->
    <rect x="536" y="564" width="328" height="66" rx="28" stroke-width="1.8" />
    <ellipse cx="700" cy="598" rx="90" ry="24" stroke-width="1.3" />

    <!-- Dimensional guides -->
    <line x1="240" y1="674" x2="1160" y2="674" stroke-width="1.6" />
    <line x1="240" y1="668" x2="240" y2="688" stroke-width="1.6" />
    <line x1="1160" y1="668" x2="1160" y2="688" stroke-width="1.6" />

    <line x1="128" y1="354" x2="128" y2="486" stroke-width="1.6" />
    <line x1="122" y1="354" x2="142" y2="354" stroke-width="1.6" />
    <line x1="122" y1="486" x2="142" y2="486" stroke-width="1.6" />

    <!-- Technical callouts -->
    <line x1="700" y1="288" x2="700" y2="154" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="700" cy="288" r="4" stroke-width="1.4" />

    <line x1="1112" y1="356" x2="1232" y2="252" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="1112" cy="356" r="4" stroke-width="1.4" />

    <line x1="760" y1="598" x2="884" y2="718" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="760" cy="598" r="4" stroke-width="1.4" />
  </g>

  <g fill="#c8f0ff" font-size="24" font-family="monospace" letter-spacing="1.2">
    <text x="594" y="140">FIELD COIL EMITTER</text>
    <text x="1240" y="246">FOCUSING DISH</text>
    <text x="896" y="726">CALIBRATION POD</text>
  </g>
</svg>
