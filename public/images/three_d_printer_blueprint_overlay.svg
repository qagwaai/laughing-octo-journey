<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840" role="img" aria-label="3D Printer blueprint overlay">
  <defs>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc9ff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#d6f2ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#7cc9ff" stop-opacity="0.45" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#lineGlow)" filter="url(#softGlow)">
    <rect x="140" y="220" width="620" height="360" rx="16" stroke-width="3" />
    <rect x="190" y="264" width="520" height="110" rx="8" stroke-width="2" />
    <rect x="220" y="392" width="460" height="150" rx="8" stroke-width="2" />

    <rect x="820" y="160" width="450" height="270" rx="14" stroke-width="2.5" />
    <rect x="860" y="205" width="150" height="170" rx="8" stroke-width="2" />
    <rect x="1080" y="205" width="150" height="170" rx="8" stroke-width="2" />
    <line x1="820" y1="295" x2="1270" y2="295" stroke-width="1.6" />

    <rect x="840" y="500" width="410" height="180" rx="12" stroke-width="2.5" />
    <rect x="900" y="545" width="170" height="86" rx="8" stroke-width="1.8" />
    <line x1="840" y1="590" x2="1250" y2="590" stroke-width="1.4" />

    <line x1="140" y1="620" x2="760" y2="620" stroke-width="1.6" />
    <line x1="140" y1="625" x2="140" y2="605" stroke-width="1.6" />
    <line x1="760" y1="625" x2="760" y2="605" stroke-width="1.6" />

    <line x1="785" y1="220" x2="785" y2="580" stroke-width="1.6" />
    <line x1="780" y1="220" x2="800" y2="220" stroke-width="1.6" />
    <line x1="780" y1="580" x2="800" y2="580" stroke-width="1.6" />

    <line x1="220" y1="470" x2="80" y2="470" stroke-width="1.5" stroke-dasharray="8 8" />
    <circle cx="220" cy="470" r="4" stroke-width="1.6" />

    <line x1="630" y1="318" x2="770" y2="100" stroke-width="1.5" stroke-dasharray="8 8" />
    <circle cx="630" cy="318" r="4" stroke-width="1.6" />

    <line x1="1070" y1="250" x2="1320" y2="110" stroke-width="1.5" stroke-dasharray="8 8" />
    <circle cx="1070" cy="250" r="4" stroke-width="1.6" />
  </g>

  <g fill="#c8f0ff" font-size="26" font-family="monospace" letter-spacing="1.2">
    <text x="320" y="662">OVERALL WIDTH 2.40 M</text>
    <text x="804" y="414" transform="rotate(-90 804 414)">OVERALL HEIGHT 2.20 M</text>
    <text x="32" y="462">PRINT BED</text>
    <text x="774" y="92">EXTRUDER / AXIS RAIL</text>
    <text x="1324" y="104" text-anchor="end">SERVICE MODULE</text>
  </g>
</svg>
