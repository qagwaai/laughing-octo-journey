<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840" role="img" aria-label="Basic Plating blueprint overlay">
  <defs>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc9ff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#d6f2ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#7cc9ff" stop-opacity="0.45" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#lineGlow)" filter="url(#softGlow)">
    <!-- Main armor panel -->
    <rect x="236" y="252" width="928" height="336" rx="22" stroke-width="2.6" />
    <rect x="278" y="292" width="844" height="256" rx="14" stroke-width="1.4" />

    <!-- Reinforcement channels -->
    <line x1="314" y1="334" x2="1086" y2="334" stroke-width="1.8" />
    <line x1="314" y1="420" x2="1086" y2="420" stroke-width="1.2" stroke-dasharray="8 6" />
    <line x1="314" y1="506" x2="1086" y2="506" stroke-width="1.8" />

    <!-- Vertical support ribs -->
    <line x1="392" y1="292" x2="392" y2="548" stroke-width="1.4" />
    <line x1="548" y1="292" x2="548" y2="548" stroke-width="1.4" />
    <line x1="704" y1="292" x2="704" y2="548" stroke-width="1.4" />
    <line x1="860" y1="292" x2="860" y2="548" stroke-width="1.4" />
    <line x1="1016" y1="292" x2="1016" y2="548" stroke-width="1.4" />

    <!-- Bolt groups -->
    <circle cx="324" cy="334" r="7" stroke-width="1.2" />
    <circle cx="1076" cy="334" r="7" stroke-width="1.2" />
    <circle cx="324" cy="506" r="7" stroke-width="1.2" />
    <circle cx="1076" cy="506" r="7" stroke-width="1.2" />

    <circle cx="392" cy="420" r="7" stroke-width="1.2" />
    <circle cx="548" cy="420" r="7" stroke-width="1.2" />
    <circle cx="704" cy="420" r="7" stroke-width="1.2" />
    <circle cx="860" cy="420" r="7" stroke-width="1.2" />
    <circle cx="1016" cy="420" r="7" stroke-width="1.2" />

    <!-- Backing lattice inset -->
    <rect x="524" y="604" width="352" height="52" rx="16" stroke-width="1.6" />
    <line x1="552" y1="630" x2="848" y2="630" stroke-width="1.2" stroke-dasharray="6 6" />

    <!-- Dimension lines -->
    <line x1="236" y1="690" x2="1164" y2="690" stroke-width="1.6" />
    <line x1="236" y1="684" x2="236" y2="704" stroke-width="1.6" />
    <line x1="1164" y1="684" x2="1164" y2="704" stroke-width="1.6" />

    <line x1="138" y1="252" x2="138" y2="588" stroke-width="1.6" />
    <line x1="132" y1="252" x2="152" y2="252" stroke-width="1.6" />
    <line x1="132" y1="588" x2="152" y2="588" stroke-width="1.6" />

    <!-- Technical callouts -->
    <line x1="704" y1="334" x2="804" y2="178" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="704" cy="334" r="4" stroke-width="1.4" />

    <line x1="1016" y1="420" x2="1162" y2="298" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="1016" cy="420" r="4" stroke-width="1.4" />

    <line x1="848" y1="630" x2="970" y2="744" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="848" cy="630" r="4" stroke-width="1.4" />
  </g>

  <g fill="#c8f0ff" font-size="24" font-family="monospace" letter-spacing="1.2">
    <text x="818" y="170">HARDENED STRIKE LAYER</text>
    <text x="1170" y="292">ANCHOR BOLT CLUSTER</text>
    <text x="978" y="748">BACKING LATTICE</text>
  </g>
</svg>
