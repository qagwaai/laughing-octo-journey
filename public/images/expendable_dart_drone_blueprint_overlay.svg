<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840" role="img" aria-label="Expendable Dart Drone blueprint overlay">
  <defs>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc9ff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#d6f2ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#7cc9ff" stop-opacity="0.45" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Side profile: long slender dart with nose cone, body, fins -->
  <g fill="none" stroke="url(#lineGlow)" filter="url(#softGlow)">

    <!-- Main body (side view) -->
    <polygon points="130,380 260,300 1200,300 1270,340 1270,440 1200,480 260,480 130,420" stroke-width="2.8" />

    <!-- Nose cone divider -->
    <line x1="260" y1="300" x2="260" y2="480" stroke-width="1.6" />

    <!-- Rear thrust cowl divider -->
    <line x1="1200" y1="300" x2="1200" y2="480" stroke-width="1.6" />

    <!-- Aft fin pair (side view) -->
    <polygon points="1200,420 1270,440 1340,520 1250,480" stroke-width="2" />
    <polygon points="1200,360 1270,340 1340,260 1250,300" stroke-width="2" />

    <!-- Warhead payload ring -->
    <rect x="290" y="318" width="90" height="144" rx="6" stroke-width="1.8" />

    <!-- Mid sensor band -->
    <rect x="660" y="306" width="60" height="168" rx="4" stroke-width="1.6" />

    <!-- Thruster nozzle outline -->
    <ellipse cx="1265" cy="390" rx="28" ry="50" stroke-width="2" />

    <!-- Overall length dimension line -->
    <line x1="130" y1="540" x2="1270" y2="540" stroke-width="1.6" />
    <line x1="130" y1="534" x2="130" y2="554" stroke-width="1.6" />
    <line x1="1270" y1="534" x2="1270" y2="554" stroke-width="1.6" />

    <!-- Diameter dimension line -->
    <line x1="80" y1="300" x2="80" y2="480" stroke-width="1.6" />
    <line x1="74" y1="300" x2="94" y2="300" stroke-width="1.6" />
    <line x1="74" y1="480" x2="94" y2="480" stroke-width="1.6" />

    <!-- Callout: warhead -->
    <line x1="335" y1="318" x2="335" y2="180" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="335" cy="318" r="4" stroke-width="1.6" />

    <!-- Callout: sensor band -->
    <line x1="690" y1="306" x2="800" y2="160" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="690" cy="306" r="4" stroke-width="1.6" />

    <!-- Callout: thruster nozzle -->
    <line x1="1265" y1="340" x2="1320" y2="180" stroke-width="1.4" stroke-dasharray="8 7" />
    <circle cx="1265" cy="340" r="4" stroke-width="1.6" />

    <!-- Top-down silhouette (compact, lower area) -->
    <polygon points="500,600 540,570 880,570 920,600 880,630 540,630" stroke-width="2" />
    <line x1="540" y1="570" x2="540" y2="630" stroke-width="1.4" />
    <line x1="880" y1="570" x2="880" y2="630" stroke-width="1.4" />
    <!-- Dorsal fin (top view) -->
    <polygon points="820,560 870,570 820,580" stroke-width="1.6" />
    <!-- Ventral fin (top view) -->
    <polygon points="820,620 870,630 820,640" stroke-width="1.6" />
  </g>

  <!-- Labels -->
  <g fill="#c8f0ff" font-size="24" font-family="monospace" letter-spacing="1.2">
    <text x="560" y="560">OVERALL LENGTH: 1.14 M</text>
    <text x="26" y="394" transform="rotate(-90 26 394)">DIAMETER: 0.18 M</text>
    <text x="258" y="172">WARHEAD PAYLOAD</text>
    <text x="806" y="154">OPTICAL / RF SENSOR</text>
    <text x="1278" y="173">THRUSTER NOZZLE</text>
  </g>
</svg>
